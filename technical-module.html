<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Technical Module - IATF</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="lib/fonts/inter.css">
</head>
<body>
  <!-- Header - hidden like other modules -->
  <header class="header supply-module-hide-header">
    <button class="menu-toggle" id="menuToggle" aria-label="Open menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="logo">
      <img src="brakes india pagr.png" alt="Brakes India Logo" class="site-logo">
    </div>
    <a href="admin-login.html" class="profile-icon profile-link" aria-label="Admin Login">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 4-6 8-6s8 2 8 6"/>
      </svg>
    </a>
  </header>

  <!-- Slide-out menu -->
  <nav class="side-menu" id="sideMenu" aria-hidden="true">
    <div class="menu-overlay" id="menuOverlay"></div>
    <div class="menu-panel">
      <ul class="menu-list">
        <li><a href="index.html" class="menu-link">Home</a></li>
        <li><a href="iatf.html" class="menu-link">IATF</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content supply-module-main">
    <div class="supply-module-container">
      <!-- Back Button -->
      <button class="supply-back-btn" id="technicalBackBtn" title="Back to IATF">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>

      <!-- Charts: single slide with 4 graphs -->
      <div class="supply-carousel technical-carousel">
        <div class="carousel-slide active" data-slide="1">
          <div class="charts-grid-4">
            <!-- Graph 1: Bar + Line -->
            <div class="chart-card">
              <h3 class="chart-title" id="techGraph1Title">Technical Graph 1</h3>
              <canvas id="techChart1"></canvas>
              <div class="chart-legend">
                <span class="legend-item">
                  <span class="legend-color target"></span>
                  <span id="techGraph1BarLabel">2024-25</span>
                </span>
                <span class="legend-item">
                  <span class="legend-color actual"></span>
                  <span id="techGraph1LineLabel">Actual</span>
                </span>
              </div>
            </div>

            <!-- Graph 2: Bar + Line -->
            <div class="chart-card">
              <h3 class="chart-title" id="techGraph2Title">Technical Graph 2</h3>
              <canvas id="techChart2"></canvas>
              <div class="chart-legend">
                <span class="legend-item">
                  <span class="legend-color target"></span>
                  <span id="techGraph2BarLabel">2024-25</span>
                </span>
                <span class="legend-item">
                  <span class="legend-color actual"></span>
                  <span id="techGraph2LineLabel">Actual</span>
                </span>
              </div>
            </div>

            <!-- Graph 3: Bar + Line -->
            <div class="chart-card">
              <h3 class="chart-title" id="techGraph3Title">Technical Graph 3</h3>
              <canvas id="techChart3"></canvas>
              <div class="chart-legend">
                <span class="legend-item">
                  <span class="legend-color target"></span>
                  <span id="techGraph3BarLabel">2024-25</span>
                </span>
                <span class="legend-item">
                  <span class="legend-color actual"></span>
                  <span id="techGraph3LineLabel">Actual</span>
                </span>
              </div>
            </div>

            <!-- Graph 4: Capacity Utilisation (bar + 3 lines) -->
            <div class="chart-card">
              <h3 class="chart-title" id="techGraph4Title">Main Assy Capacity Utilisation 2025-26</h3>
              <canvas id="techChart4"></canvas>
              <div class="chart-legend">
                <span class="legend-item">
                  <span class="legend-color actual"></span>
                  <span id="techGraph4BarLabel">Actual</span>
                </span>
                <span class="legend-item">
                  <span class="legend-color maint-bar1"></span>
                  <span id="techGraph4Line1Label">Line Capacity</span>
                </span>
                <span class="legend-item">
                  <span class="legend-color maint-bar2"></span>
                  <span id="techGraph4Line2Label">Series</span>
                </span>
                <span class="legend-item">
                  <span class="legend-color maint-stack2"></span>
                  <span id="techGraph4Line3Label">Utilization %</span>
                </span>
              </div>
            </div>
          </div>
        </div>
      </div> <!-- /.technical-carousel -->
    </div>
  </main>

  <script src="lib/chartjs/chart.umd.js"></script>
  <script src="lib/chartjs/chartjs-plugin-datalabels.min.js"></script>
  <script>Chart.register(ChartDataLabels);</script>
  <script src="technical-module.js"></script>
  <script src="script.js"></script>
</body>
</html>
